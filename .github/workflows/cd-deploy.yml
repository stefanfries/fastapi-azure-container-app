name: CD - Build and Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  AZURE_RESOURCE_GROUP: rg-FastAPI-AzureContainerApp-dev
  AZURE_CONTAINER_APP_NAME: ca-fastapi

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract app version
        id: version
        run: |
          APP_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "Detected app version: $APP_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.APP_VERSION }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        run: |
          IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.APP_VERSION }}"
          echo "Deploying image: $IMAGE_TAG"
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image $IMAGE_TAG \
            --set-env-vars APP_VERSION=${{ steps.version.outputs.APP_VERSION }}

      - name: Get application URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "APP_URL=https://$FQDN" >> $GITHUB_OUTPUT
          echo "### 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.APP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.APP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Application URL:** https://$FQDN" >> $GITHUB_STEP_SUMMARY
          echo "**API Documentation:** https://$FQDN/docs" >> $GITHUB_STEP_SUMMARY
          echo "**Health Check:** https://$FQDN/" >> $GITHUB_STEP_SUMMARY

      - name: Test deployment
        run: |
          sleep 10
          curl -f ${{ steps.get-url.outputs.APP_URL }} || echo "⚠️ App may still be starting"
